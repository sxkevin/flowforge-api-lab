<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自动化测试平台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-bar">
          <div class="brand-mark">AT</div>
          <div class="brand-copy">自动化测试平台</div>
        </div>

        <nav class="side-nav">
          <button class="nav-item active" data-tab="overview">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z"/></svg>
            </span>
            <span>工作台</span>
          </button>
          <button class="nav-item" data-tab="apis">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm7.6 9h-3.1a15.8 15.8 0 00-2-6A8.03 8.03 0 0119.6 11zM12 4c1.6 1.9 2.6 4.4 2.9 7H9.1c.3-2.6 1.3-5.1 2.9-7zM9.5 5A15.8 15.8 0 007.5 11H4.4A8.03 8.03 0 019.5 5zM4.4 13h3.1a15.8 15.8 0 002 6A8.03 8.03 0 014.4 13zm7.6 7c-1.6-1.9-2.6-4.4-2.9-7h5.8c-.3 2.6-1.3 5.1-2.9 7zm2.5-1a15.8 15.8 0 002-6h3.1a8.03 8.03 0 01-5.1 6z"/></svg>
            </span>
            <span>接口管理</span>
          </button>
          <button class="nav-item" data-tab="cases">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h10l4 4v14H3V3h4zm0 2H5v14h14V8h-3V5H7zm8 0v3h3"/></svg>
            </span>
            <span>测试用例</span>
          </button>
          <button class="nav-item" data-tab="suites">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4a3 3 0 012.8 2H14a3 3 0 112.8 4H16v4h2.2a3 3 0 11-.1 2H14V9.8H9.8A3 3 0 117 4zm0 2a1 1 0 100 2 1 1 0 000-2zm10 0a1 1 0 100 2 1 1 0 000-2zM7 16a1 1 0 100 2 1 1 0 000-2zm12 0a1 1 0 100 2 1 1 0 000-2z"/></svg>
            </span>
            <span>场景编排</span>
          </button>
          <button class="nav-item" data-tab="scheduler">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a9 9 0 109 9 9.01 9.01 0 00-9-9zm0 2a7 7 0 11-7 7 7.01 7.01 0 017-7zm-1 2h2v5.2l3.4 2.1-1 1.7L11 13.3z"/></svg>
            </span>
            <span>定时调度</span>
          </button>
          <button class="nav-item" data-tab="execution">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a9 9 0 100 18 9 9 0 000-18zm-2 5.5l6 3.5-6 3.5v-7z"/></svg>
            </span>
            <span>执行中心</span>
          </button>
          <button class="nav-item" data-tab="reports">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19h16v2H2V3h2v16zm3-2V9h3v8H7zm5 0V5h3v12h-3zm5 0v-6h3v6h-3z"/></svg>
            </span>
            <span>测试报告</span>
          </button>
          <button class="nav-item" data-tab="envs">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.4 13a7.96 7.96 0 000-2l2-1.6-2-3.4-2.3.8a8.8 8.8 0 00-1.7-1L15 2h-6l-.4 2.8a8.8 8.8 0 00-1.7 1l-2.3-.8-2 3.4 2 1.6a7.96 7.96 0 000 2l-2 1.6 2 3.4 2.3-.8a8.8 8.8 0 001.7 1L9 22h6l.4-2.8a8.8 8.8 0 001.7-1l2.3.8 2-3.4-2-1.6zM12 16a4 4 0 110-8 4 4 0 010 8z"/></svg>
            </span>
            <span>环境管理</span>
          </button>
        </nav>

        <div class="sidebar-foot">
          <button class="collapse-button" data-action="toggle-sidebar" type="button">
            <span class="collapse-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.4 5.4L9 12l6.4 6.6-1.4 1.4L6.2 12 14 4z"/></svg>
            </span>
            <span class="collapse-label">收起</span>
          </button>
        </div>
      </aside>

      <div class="workspace">
        <header class="topbar">
          <h1 id="pageTitle">工作台</h1>
          <div class="topbar-right">
            <button class="bell-button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a5 5 0 00-5 5v3.4L5.3 15v1h13.4v-1L17 11.4V8a5 5 0 00-5-5zm0 18a2.5 2.5 0 002.45-2h-4.9A2.5 2.5 0 0012 21z"/></svg>
              <span class="notice-dot"></span>
            </button>
            <div class="user-badge">
              <span class="avatar">QA</span>
              <span class="user-name">测试工程师</span>
            </div>
            <button
              class="secondary-button account-button"
              id="changePasswordButton"
              data-action="open-modal"
              data-modal-type="change-password"
              type="button"
              hidden
            >
              修改密码
            </button>
            <button class="secondary-button logout-button" id="logoutButton" data-action="logout" type="button" hidden>退出登录</button>
          </div>
        </header>

        <main class="page-body" id="pageBody"></main>
      </div>
    </div>

    <div class="modal-root" id="modalRoot"></div>
    <div class="toast-root" id="toastRoot"></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
